name: CLI Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: cli-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
      package_name: ${{ steps.metadata.outputs.package_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate release metadata
        id: metadata
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          import tomllib

          from backend import __version__

          tag = os.environ["GITHUB_REF_NAME"].strip()
          version = __version__.strip()
          expected_tag = f"v{version}"
          if tag != expected_tag:
              raise SystemExit(
                  f"Tag/version mismatch: git tag is {tag}, backend.__version__ expects {expected_tag}"
              )
          with open("pyproject.toml", "rb") as fh:
              project = tomllib.load(fh)["project"]
          package_name = project["name"].strip()
          if not package_name:
              raise SystemExit("pyproject.toml project.name must be set for release publishing")
          print(f"tag={tag}")
          print(f"version={version}")
          print(f"package_name={package_name}")
          PY

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish_testpypi:
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: python-distributions
          path: dist

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          print-hash: true

  smoke_testpypi:
    needs:
      - validate
      - publish_testpypi
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pipx
        run: |
          python -m pip install --user pipx
          python -m pipx ensurepath
          echo "$(python -m pipx environment --value PIPX_BIN_DIR)" >> "$GITHUB_PATH"

      - name: Install package from TestPyPI
        env:
          PACKAGE_NAME: ${{ needs.validate.outputs.package_name }}
          PACKAGE_VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python -m pipx install \
            --pip-args="--index-url https://test.pypi.org/simple --extra-index-url https://pypi.org/simple" \
            "${PACKAGE_NAME}==${PACKAGE_VERSION}"

      - name: Smoke installed CLI
        run: |
          portworld --help
          portworld init --help
          portworld providers list
          portworld update cli --json

  publish_pypi:
    needs:
      - build
      - smoke_testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: python-distributions
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          print-hash: true

  github_release:
    needs:
      - validate
      - publish_pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v5
        with:
          name: python-distributions
          path: dist

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --verify-tag --notes-from-tag
          fi
